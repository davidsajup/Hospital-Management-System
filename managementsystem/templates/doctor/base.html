{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{%block title%}{%endblock%}</title>
    <link rel="stylesheet" href="{%static 'css/home.css'%}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    {%block style%}{%endblock%}
    <style>
        .main-content {
            flex: 1;
            min-width: 0;
            width: 100%;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            gap: 20px;
        }

        .topbar h1{
            font-size: 24px;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile{
            display:flex;
            align-items:center;
            gap:12px;
            flex-shrink: 0;
        }

        .card-container {
            width: 100%;
            min-width: 0;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
                overflow-x: hidden;
            }
            .topbar {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
                margin-bottom: 20px;
            }
            .topbar h1 {
                font-size: 18px;
            }
            .profile span {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        {% with sidebar_role='doctor' %}
            {% include 'includes/sidebar.html' %}
        {% endwith %}

        <main class="main-content">
            <header class="topbar">
                <h1>{%block header%}{%endblock%}</h1>
                <div class="profile">
                    {%block profile%}{%endblock%}
                </div>
            </header>
            <div class="card-container">
                {%block content%}{%endblock%}
            </div>

        </main>

    </div>
</body>
</html>
