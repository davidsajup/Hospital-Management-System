<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eef4ff, #dcecff);
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-container{
            width: 450px;
            background: white;
            padding: 30px 20px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .login-container h1{
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #1f2937;
        }

        .form-control{
            height: 50px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            margin-bottom: 10px;
            padding-left: 15px;
            transition: 0.3s ease;
        }

        .form-control:focus{
            border-color: #2563eb;
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
        }

        .login-btn{
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 10px;
            background-color: #2864e4;
            color: white;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover{
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    
    
    <div class="login-container">
       
        <h1>Register</h1>
         {% if er %}
                <div class="alert alert-danger">
                    {{ er }}
                </div>
        {% endif %}
        <form action="/register/" method="post">
            {%csrf_token%}
            <input type="text" class="form-control" placeholder="Enter Username" name="username">
            <input type="text" class="form-control" placeholder="Enter first name" name="fname">
            <input type="text" class="form-control" placeholder="Enter last name" name="lname">
            <input type="email" class="form-control" placeholder="Enter Email Address" name="email">
            <input type="password" class="form-control" placeholder="Enter Password" name="psw1">
            <input type="password" class="form-control" placeholder="Confirm Password" name="psw2">
            <input type="submit" value="Register" class="login-btn">
        </form>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
